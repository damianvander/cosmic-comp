name: Patch & Build

on:
  # ── Poll upstream for new epoch tags every 6 hours ──────────────────
  schedule:
    - cron: '0 */6 * * *'

  # ── Manual trigger ─────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      component:
        description: Which component to patch & build.
        type: choice
        options: [all, cosmic-comp, cosmic-settings]
        default: all
      upstream_ref:
        description: >
          Epoch tag (e.g. 'epoch-1.2.0') or raw commit to build against.
          Leave empty to build the latest epoch tag.
        required: false
        default: ''
      force:
        description: Rebuild even if a release for the tag already exists.
        type: boolean
        default: false

jobs:
  # GitHub auto-disables scheduled workflows after 60 days without repo
  # activity; re-enabling ourselves on every scheduled run resets that timer.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Reset scheduled-workflow inactivity timer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh api --method PUT
          repos/${{ github.repository }}/actions/workflows/patch-and-build.yml/enable

  build:
    name: ${{ matrix.component }}
    # (Legs not selected on manual dispatch are skipped inside the resolve
    # step — the `matrix` context is not available in a job-level `if`.)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - component: cosmic-comp
            repo: https://github.com/pop-os/cosmic-comp.git
            patch: cosmic-comp-kinetic.patch
            binary: cosmic-comp
            build_args: --release
            # cosmic-comp-config's local patch path is not needed for the comp build.
            needs_comp_config: false
            deps: >-
              libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev
              libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev
              libseat-dev libdisplay-info-dev
          - component: cosmic-settings
            repo: https://github.com/pop-os/cosmic-settings.git
            patch: cosmic-settings-kinetic.patch
            binary: cosmic-settings
            build_args: --release -p cosmic-settings
            # The settings patch redirects cosmic-comp-config at a sibling
            # patched cosmic-comp checkout — CI must lay that out (see below).
            needs_comp_config: true
            deps: >-
              lld cmake libclang-dev libdav1d-dev libexpat1-dev
              libfontconfig-dev libfreetype-dev libpipewire-0.3-dev
              libpulse-dev pkg-config libxkbcommon-dev libudev-dev
              libinput-dev libwayland-dev

    steps:
      # ── 1. Checkout this patch repo (holds the .patch files) ─────────
      - name: Checkout patch repo
        uses: actions/checkout@v4
        with:
          path: patchrepo

      # ── 2. Resolve the upstream ref & decide whether to build ────────
      - name: Resolve upstream ref
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ matrix.repo }}
          COMPONENT: ${{ matrix.component }}
          MANUAL_REF: ${{ github.event.inputs.upstream_ref }}
          FORCE: ${{ github.event.inputs.force }}
          SELECTED: ${{ github.event.inputs.component }}
        run: |
          set -euo pipefail

          # Skip legs not selected on manual dispatch; always run all on schedule.
          if [ -n "$SELECTED" ] && [ "$SELECTED" != "all" ] && [ "$SELECTED" != "$COMPONENT" ]; then
            echo "$COMPONENT not selected (component=$SELECTED) — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$MANUAL_REF" ]; then
            if [[ "$MANUAL_REF" == epoch-* ]]; then
              TAG="$MANUAL_REF"
              COMMIT=$(git ls-remote "$REPO" "refs/tags/$TAG" | cut -f1)
              [ -z "$COMMIT" ] && { echo "::error::Tag $TAG not found in $REPO"; exit 1; }
            else
              TAG="manual-${MANUAL_REF:0:8}"
              COMMIT="$MANUAL_REF"
            fi
          else
            LATEST=$(git ls-remote --tags --sort=-v:refname "$REPO" 'epoch-*' \
                     | grep -v '\^{}' | head -n1)
            TAG=$(echo "$LATEST" | sed 's|.*refs/tags/||')
            COMMIT=$(echo "$LATEST" | cut -f1)
            if [ -z "$TAG" ] || [ -z "$COMMIT" ]; then
              echo "::warning::No epoch tags found in $REPO"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          RELEASE_TAG="patched-${COMPONENT}-${TAG}"

          if [ "$FORCE" != "true" ] && \
             gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

          echo "tag=$TAG"                 >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT"           >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          {
            echo "### ${COMPONENT}"
            echo "- **Upstream tag:** \`$TAG\`"
            echo "- **Commit:** \`$COMMIT\`"
            echo "- **Release tag:** \`$RELEASE_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── 3. Clone the upstream component at the resolved commit ───────
      - name: Checkout upstream ${{ matrix.component }}
        if: steps.resolve.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          git clone "${{ matrix.repo }}" "${{ matrix.component }}"
          git -C "${{ matrix.component }}" checkout ${{ steps.resolve.outputs.commit }}
          git -C "${{ matrix.component }}" apply "$GITHUB_WORKSPACE/patchrepo/${{ matrix.patch }}"
          echo "✅ Applied ${{ matrix.patch }} on ${{ steps.resolve.outputs.tag }}"

      # ── 3b. cosmic-settings only: lay out the sibling patched
      #        cosmic-comp so its cosmic-comp-config path patch resolves ─
      - name: Prepare patched cosmic-comp-config
        if: steps.resolve.outputs.should_build == 'true' && matrix.needs_comp_config
        run: |
          set -euo pipefail
          git clone https://github.com/pop-os/cosmic-comp.git cosmic-comp
          # Match the settings tag; fall back to master if that tag is absent.
          if git -C cosmic-comp rev-parse -q --verify "${{ steps.resolve.outputs.tag }}^{commit}" >/dev/null; then
            git -C cosmic-comp checkout "${{ steps.resolve.outputs.tag }}"
          else
            echo "::warning::cosmic-comp has no ${{ steps.resolve.outputs.tag }}; using master for cosmic-comp-config"
          fi
          git -C cosmic-comp apply "$GITHUB_WORKSPACE/patchrepo/cosmic-comp-kinetic.patch"

      # ── 4. System build dependencies ────────────────────────────────
      - name: Install system dependencies
        if: steps.resolve.outputs.should_build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      # ── 5. Rust toolchain ───────────────────────────────────────────
      - name: Install Rust
        if: steps.resolve.outputs.should_build == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      # ── 6. Cargo cache ──────────────────────────────────────────────
      - name: Cargo cache
        if: steps.resolve.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ matrix.component }}/target
          key: ${{ runner.os }}-${{ matrix.component }}-${{ steps.resolve.outputs.tag }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.component }}-

      # ── 7. Build ────────────────────────────────────────────────────
      - name: Build release binary
        if: steps.resolve.outputs.should_build == 'true'
        working-directory: ${{ matrix.component }}
        run: cargo build ${{ matrix.build_args }}

      # ── 8. Package assets ───────────────────────────────────────────
      - name: Package
        id: pkg
        if: steps.resolve.outputs.should_build == 'true'
        working-directory: ${{ matrix.component }}
        run: |
          set -euo pipefail
          BIN="target/release/${{ matrix.binary }}"
          VERSION=$("$BIN" --version 2>/dev/null || echo "unknown")
          cp "$BIN" "${{ matrix.binary }}"
          gzip -k "${{ matrix.binary }}"
          sha256sum "${{ matrix.binary }}.gz" "${{ matrix.binary }}" > checksums-sha256.txt
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 9. Publish GitHub Release ───────────────────────────────────
      - name: Create GitHub Release
        if: steps.resolve.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve.outputs.release_tag }}
          name: "${{ matrix.component }} + kinetic scrolling (${{ steps.resolve.outputs.tag }})"
          body: |
            ## Patched ${{ matrix.component }}

            Applies the kinetic (smooth) scrolling + per-app scroll-factor
            override patch on top of upstream
            [`${{ steps.resolve.outputs.tag }}`](https://github.com/pop-os/${{ matrix.component }}/releases/tag/${{ steps.resolve.outputs.tag }}).

            **Upstream commit:** `${{ steps.resolve.outputs.commit }}`
            **Binary version:** `${{ steps.pkg.outputs.version }}`
            **Patch:** `${{ matrix.patch }}`

            ### Install
            ```bash
            ./install-kinetic.sh ${{ matrix.component }}
            ```
            or manually:
            ```bash
            gunzip ${{ matrix.binary }}.gz
            chmod +x ${{ matrix.binary }}
            sudo install -Dm0755 ${{ matrix.binary }} /usr/bin/${{ matrix.binary }}
            ```

            > [!NOTE]
            > Log out and back in (or restart the relevant service) for the new
            > binary to take effect.
          files: |
            ${{ matrix.component }}/${{ matrix.binary }}.gz
            ${{ matrix.component }}/${{ matrix.binary }}
            ${{ matrix.component }}/checksums-sha256.txt
          draft: false
          prerelease: false
