name: Patch & Build cosmic-comp

on:
  # ── Poll upstream for new epoch tags every 6 hours ──────────────────
  schedule:
    - cron: '0 */6 * * *'

  # ── Manual trigger with optional upstream ref override ──────────────
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: >
          Git hash or tag (e.g. 'epoch-1.2.0') from pop-os/cosmic-comp to
          patch against. Leave empty to build the latest epoch tag.
        required: false
        default: ''

env:
  UPSTREAM_REPO: https://github.com/pop-os/cosmic-comp.git
  PATCH_FILE: kinetic-scrolling.patch

jobs:
  # ════════════════════════════════════════════════════════════════════
  # Job 1: Detect new upstream epoch tags we haven't released yet
  # ════════════════════════════════════════════════════════════════════
  detect:
    name: Detect new epoch releases
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      commit: ${{ steps.resolve.outputs.commit }}
      should_build: ${{ steps.resolve.outputs.should_build }}

    steps:
      - name: Resolve upstream ref
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          MANUAL_REF="${{ github.event.inputs.upstream_ref }}"

          if [ -n "$MANUAL_REF" ]; then
            # ── Manual dispatch with explicit ref ──
            # Check if it looks like an epoch tag
            if [[ "$MANUAL_REF" == epoch-* ]]; then
              TAG="$MANUAL_REF"
              COMMIT=$(git ls-remote "$UPSTREAM_REPO" "refs/tags/$TAG" | cut -f1)
              if [ -z "$COMMIT" ]; then
                echo "::error::Tag $TAG not found in upstream"
                exit 1
              fi
            else
              # Treat as a raw commit hash
              TAG="manual-${MANUAL_REF:0:8}"
              COMMIT="$MANUAL_REF"
            fi
            echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
            echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "### Manual build requested" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Ref:** \`$MANUAL_REF\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # ── Scheduled run: find the latest upstream epoch tag ──
          LATEST=$(git ls-remote --tags --sort=-v:refname "$UPSTREAM_REPO" 'epoch-*' \
                   | head -n1)
          TAG=$(echo "$LATEST" | sed 's|.*refs/tags/||')
          COMMIT=$(echo "$LATEST" | cut -f1)

          if [ -z "$TAG" ] || [ -z "$COMMIT" ]; then
            echo "::warning::No epoch tags found upstream"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest upstream epoch tag: $TAG ($COMMIT)"

          # Check if we already have a release for this tag
          RELEASE_TAG="patched-${TAG}"
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for $RELEASE_TAG — triggering build"
            echo "tag=$TAG"            >> "$GITHUB_OUTPUT"
            echo "commit=$COMMIT"      >> "$GITHUB_OUTPUT"
            echo "should_build=true"   >> "$GITHUB_OUTPUT"
          fi

          echo "### Detection Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Latest upstream tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════════════
  # Job 2: Patch & build, then publish a GitHub Release
  # ════════════════════════════════════════════════════════════════════
  patch-and-build:
    name: Patch & Release Build
    needs: detect
    if: needs.detect.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to create releases

    steps:
      # ── 1. Checkout this fork (contains the patch file) ──────────────
      - name: Checkout fork
        uses: actions/checkout@v4

      # ── 2. Fetch the upstream repo ───────────────────────────────────
      - name: Fetch upstream
        run: |
          git remote add cosmic "$UPSTREAM_REPO" || true
          git fetch cosmic --tags

      # ── 3. Create a clean branch from the upstream commit ────────────
      - name: Create patched branch
        run: |
          git checkout ${{ needs.detect.outputs.commit }}
          git checkout -b patched-build

      # ── 4. Apply the kinetic scrolling patch ─────────────────────────
      - name: Apply patch
        run: |
          git show origin/${{ github.ref_name }}:${{ env.PATCH_FILE }} > /tmp/patch.diff
          echo "::group::Patch stats"
          git apply --stat /tmp/patch.diff
          echo "::endgroup::"
          git apply /tmp/patch.diff
          echo "✅ Patch applied cleanly on top of ${{ needs.detect.outputs.tag }}"

      # ── 5. Install system build dependencies ─────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev libgbm-dev libxkbcommon-dev libegl1-mesa-dev \
            libwayland-dev libinput-dev libdbus-1-dev libsystemd-dev \
            libseat-dev libdisplay-info-dev

      # ── 6. Install Rust toolchain ────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.90"

      # ── 7. Cargo cache ──────────────────────────────────────────────
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      # ── 8. Build production binary ───────────────────────────────────
      - name: Build release binary
        run: cargo build --release

      # ── 9. Prepare release assets ───────────────────────────────────
      - name: Prepare release
        id: meta
        run: |
          TAG="${{ needs.detect.outputs.tag }}"
          RELEASE_TAG="patched-${TAG}"
          BINARY=target/release/cosmic-comp
          VERSION=$($BINARY --version 2>/dev/null || echo "unknown")

          # Compress the binary
          cp "$BINARY" cosmic-comp
          gzip -k cosmic-comp
          sha256sum cosmic-comp.gz cosmic-comp > checksums-sha256.txt

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"

          echo "### Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upstream tag:** \`$TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release tag:** \`$RELEASE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Binary version:** \`$VERSION\`" >> "$GITHUB_STEP_SUMMARY"

      # ── 10. Create GitHub Release ───────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: "cosmic-comp + kinetic scrolling (${{ needs.detect.outputs.tag }})"
          body: |
            ## Patched cosmic-comp build

            This release applies the **kinetic (smooth) scrolling** patch on top of
            upstream [`${{ needs.detect.outputs.tag }}`](https://github.com/pop-os/cosmic-comp/releases/tag/${{ needs.detect.outputs.tag }}).

            **Upstream commit:** `${{ needs.detect.outputs.commit }}`
            **Binary version:** `${{ steps.meta.outputs.version }}`
            **Patch:** `${{ env.PATCH_FILE }}`

            ### Install
            ```bash
            gunzip cosmic-comp.gz
            chmod +x cosmic-comp
            sudo install -Dm0755 cosmic-comp /usr/bin/cosmic-comp
            ```

            > [!NOTE]
            > You will need to log out and back in (or restart `cosmic-comp.service`)
            > for the new binary to take effect.
          files: |
            cosmic-comp.gz
            cosmic-comp
            checksums-sha256.txt
          draft: false
          prerelease: false
